# Sharing options at the bottom of the post.
# Icons from <https://fontawesome.com/>

platforms:
  #- type: Twitter
    # Corrigido: 'fa-square-x-twitter' -> 'fa-x-twitter'
   # icon: "fa-brands fa-x-twitter"
    # Mantive TITLE/URL; a entidade &amp; é correta dentro do YAML
    #link: "https://twitter.com/intent/tweet?text=TITLE&amp;url=URL"

  - type: Facebook
    # Você já usava 'fab fa-facebook-square' (funciona). Se quiser o “logo plano”, pode usar 'fa-brands fa-facebook'
    icon: "fab fa-facebook-square"
    link: "https://www.facebook.com/sharer/sharer.php?title=TITLE&amp;u=URL"

  - type: Telegram
    icon: "fab fa-telegram"
    link: "https://t.me/share/url?url=URL&amp;text=TITLE"
 
  - type: Linkedin
    icon: "fab fa-linkedin"
    link: "https://www.linkedin.com/sharing/share-offsite/?url=URL"

  # Exemplos opcionais (descomentando conforme necessidade):

